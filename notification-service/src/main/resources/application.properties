spring.application.name=notification-service
server.port=8083

# Mail Properties
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=de5fcc293557ed
spring.mail.password=aff1f0a481ef61

# Kafka Consumer Properties
# Local Development (commented for Kubernetes)
#spring.kafka.bootstrap-servers=localhost:9092
#spring.kafka.consumer.properties.schema.registry.url=http://127.0.0.1:8085

# Kubernetes
spring.kafka.bootstrap-servers=kafka-service:9092
spring.kafka.consumer.group-id=notificationService
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=io.confluent.kafka.serializers.KafkaAvroDeserializer
spring.kafka.consumer.properties.schema.registry.url=http://schema-registry-service:8085
spring.kafka.consumer.properties.specific.avro.reader=true
spring.kafka.consumer.properties.spring.json.type.mapping=event:com.manu.ms.order.event.OrderPlacedEvent

management.endpoints.web.exposure.include=health, info, metrics, prometheus
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.observations.key-values.application=notification-service
management.tracing.sampling.probability=1.0