apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: manushagunathilaka99/product-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_MONGODB_URI
              value: mongodb://mongodb-service:27017/product-service
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
spec:
  selector:
    app: product-service
  ports:
    - port: 8080
      targetPort: 8080