spring.application.name=Inventory

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Local Development (commented for Kubernetes)
#spring.datasource.url=jdbc:mysql://localhost:3307/manu-inventoryrdb-ms?createDatabaseIfNotExist=true
#spring.datasource.username=root
#spring.datasource.password=1234

# Kubernetes
spring.datasource.url=jdbc:mysql://mysql-service:3306/manu-inventoryrdb-ms?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=password

spring.jpa.hibernate.ddl-auto=none
server.port=8082

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

management.endpoints.web.exposure.include=health, info, metrics, prometheus
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.observations.key-values.application=inventory-service
management.tracing.sampling.probability=1.0